name: Release packages

on:
  release:
    types:
      - published
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check release metadata
        run: bun run release:check

      - name: Check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Generate release notes
        run: bun run release:notes -- --output release-notes.md

      - name: Resolve release version
        id: release
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check published npm packages
        id: npm_status
        run: |
          version="${{ steps.release.outputs.version }}"
          if npm view "@ingraft/cli@$version" version >/dev/null 2>&1; then
            echo "cli=published" >> "$GITHUB_OUTPUT"
          else
            echo "cli=missing" >> "$GITHUB_OUTPUT"
          fi
          if npm view "ingraft@$version" version >/dev/null 2>&1; then
            echo "ingraft=published" >> "$GITHUB_OUTPUT"
          else
            echo "ingraft=missing" >> "$GITHUB_OUTPUT"
          fi
          if npm view "@ingraft/skill@$version" version >/dev/null 2>&1; then
            echo "skill=published" >> "$GITHUB_OUTPUT"
          else
            echo "skill=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @ingraft/cli
        if: steps.npm_status.outputs.cli != 'published'
        working-directory: packages/cli
        run: npm publish --access public --provenance

      - name: Publish ingraft compatibility package
        if: steps.npm_status.outputs.ingraft != 'published'
        working-directory: packages/ingraft
        run: npm publish --access public --provenance

      - name: Publish @ingraft/skill
        if: steps.npm_status.outputs.skill != 'published'
        working-directory: packages/skill
        run: npm publish --access public --provenance
