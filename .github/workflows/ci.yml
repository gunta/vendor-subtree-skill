name: CI

on:
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Pack npm packages
        shell: bash
        run: |
          rm -rf .artifacts
          mkdir -p .artifacts
          (cd packages/cli && npm pack --pack-destination ../../.artifacts)
          (cd packages/ingraft && npm pack --pack-destination ../../.artifacts)
          (cd packages/skill && npm pack --pack-destination ../../.artifacts)

      - name: Upload npm packages
        uses: actions/upload-artifact@v6
        with:
          name: ingraft-npm-packages
          path: .artifacts/*.tgz
          if-no-files-found: error
          retention-days: 7

  install-smoke:
    name: Install smoke (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Download npm packages
        uses: actions/download-artifact@v6
        with:
          name: ingraft-npm-packages
          path: .artifacts

      - name: Smoke install packaged CLI
        run: node scripts/ci/smoke-install.mjs .artifacts
