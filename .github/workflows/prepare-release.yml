name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional exact semver version. Leave blank to auto-bump.
        required: false
        type: string
      bump:
        description: Automatic semver bump to use when version is blank
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - prerelease
      prerelease:
        description: Mark the eventual GitHub release as a prerelease
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release-${{ inputs.version || inputs.bump }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve release version
        id: release
        run: |
          args=()
          if [ -n "${{ inputs.version }}" ]; then
            args+=(--version "${{ inputs.version }}")
          fi
          args+=(--bump "${{ inputs.bump }}")
          version="$(bun scripts/release.ts next "${args[@]}")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create release branch
        run: git switch -c release/v${{ steps.release.outputs.version }}

      - name: Prepare release files
        run: |
          args=()
          if [ -n "${{ inputs.version }}" ]; then
            args+=(--version "${{ inputs.version }}")
          fi
          args+=(--bump "${{ inputs.bump }}")
          bun run release:prepare -- "${args[@]}"

      - name: Check release metadata
        run: bun run release:check

      - name: Check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Generate release notes
        run: bun run release:notes -- --output release-notes.md

      - name: Commit release files
        run: |
          git add CHANGELOG.md RELEASE.md Formula/ingraft.rb package.json packages/cli/package.json packages/cli/package-lock.json packages/skill/package.json
          git commit -m "chore: prepare v${{ steps.release.outputs.version }}"

      - name: Push release branch
        run: git push --set-upstream origin release/v${{ steps.release.outputs.version }}

      - name: Create release PR
        run: gh pr create --fill --base main --head release/v${{ steps.release.outputs.version }}
        env:
          GH_TOKEN: ${{ github.token }}
